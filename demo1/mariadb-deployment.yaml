apiVersion: apps/v1
kind: Deployment

metadata:
  name: mariadb
  labels:
    app: mariadb
    project: kubeforge

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mariadb

  template:
    metadata:
      labels:
        app: mariadb
        project: kubeforge

    spec:
      containers:
        - name: mariadb
          image: mariadb:latest

          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD

            - name: MARIADB_DATABASE
              value: "kubeforge"

            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_USER

            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD

          ports:
            - containerPort: 3306

          volumeMounts:
            - name: mariadb-storage
              mountPath: /var/lib/mysql

      volumes:
        - name: mariadb-storage
          persistentVolumeClaim:
            claimName: mariadb-pvc
