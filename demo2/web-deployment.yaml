apiVersion: apps/v1
kind: Deployment

metadata:
  namespace: demo1
  name: web
  labels:
    app: web
    project: kubeforg

spec:
  replicas: 3

  selector:
    matchLabels:
      app: web

  template:
    metadata:
      labels:
        app: web
        project: kubeforge

    spec:
      containers:
        - name: flask
          image: localhost:32000/demo1-flask:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: APP_TITLE
              valueFrom:
                configMapKeyRef:
                  name: web-config
                  key: APP_TITLE

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
